apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfs-gateway
  labels:
    app: nfs-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nfs-gateway
  labels:
    app: nfs-gateway
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nfs-gateway
  labels:
    app: nfs-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nfs-gateway
subjects:
- kind: ServiceAccount
  name: nfs-gateway
  namespace: default

