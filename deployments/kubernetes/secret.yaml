apiVersion: v1
kind: Secret
metadata:
  name: nfs-gateway-secret
  labels:
    app: nfs-gateway
type: Opaque
stringData:
  # Replace with your actual IBM Cloud API key
  ibm-cloud-api-key: "YOUR_IBM_CLOUD_API_KEY_HERE"
  
  # Optional: HMAC credentials (if using HMAC auth instead of IAM)
  # cos-access-key: "YOUR_ACCESS_KEY_HERE"
  # cos-secret-key: "YOUR_SECRET_KEY_HERE"

