apiVersion: v1
kind: ConfigMap
metadata:
  name: nfs-gateway-config
  labels:
    app: nfs-gateway
data:
  cos.endpoint: "s3.us-south.cloud-object-storage.appdomain.cloud"
  cos.bucket: "my-nfs-bucket"
  cos.region: "us-south"
  
  config.yaml: |
    server:
      nfs_port: 2049
      metrics_port: 8080
      health_port: 8081
      max_connections: 1000
      read_timeout: "30s"
      write_timeout: "30s"

    cos:
      endpoint: "s3.us-south.cloud-object-storage.appdomain.cloud"
      bucket: "my-nfs-bucket"
      region: "us-south"
      auth_type: "iam"
      max_retries: 3
      timeout: "30s"

    cache:
      metadata:
        enabled: true
        size_mb: 256
        ttl_seconds: 60
        max_entries: 10000
      data:
        enabled: true
        size_gb: 10
        path: "/var/cache/nfs-gateway"
        chunk_size_kb: 1024

    performance:
      read_ahead_kb: 8192
      write_buffer_kb: 4096
      multipart_threshold_mb: 100
      multipart_chunk_mb: 10
      worker_pool_size: 100
      max_concurrent_reads: 50
      max_concurrent_writes: 25
      max_full_object_read_mb: 512
      max_buffered_write_mb: 512
      max_directory_entries: 100000

    logging:
      level: "info"
      format: "json"
      output: "stdout"

