apiVersion: v1
kind: Service
metadata:
  name: nfs-gateway
  labels:
    app: nfs-gateway
spec:
  type: LoadBalancer
  selector:
    app: nfs-gateway
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-gateway-metrics
  labels:
    app: nfs-gateway
spec:
  type: ClusterIP
  selector:
    app: nfs-gateway
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP

