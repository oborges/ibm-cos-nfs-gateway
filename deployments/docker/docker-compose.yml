version: '3.8'

services:
  nfs-gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    image: oborges/cos-nfs-gateway:latest
    container_name: cos-nfs-gateway
    ports:
      - "2049:2049"   # NFS
      - "8080:8080"   # Metrics
      - "8081:8081"   # Health
    environment:
      # COS Configuration
      - COS_ENDPOINT=${COS_ENDPOINT}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION:-us-south}
      - IBM_CLOUD_API_KEY=${IBM_CLOUD_API_KEY}
      
      # Logging
      - NFS_GATEWAY_LOGGING_LEVEL=${LOG_LEVEL:-info}
      - NFS_GATEWAY_LOGGING_FORMAT=json
      
      # Cache
      - NFS_GATEWAY_CACHE_METADATA_ENABLED=true
      - NFS_GATEWAY_CACHE_DATA_ENABLED=true
    volumes:
      # Configuration
      - ./config.yaml:/etc/nfs-gateway/config.yaml:ro
      
      # Cache storage
      - nfs-cache:/var/cache/nfs-gateway
      
      # Logs (optional)
      - ./logs:/var/log/nfs-gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nfs-network

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nfs-network
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD before enabling the monitoring profile}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - nfs-network
    profiles:
      - monitoring

volumes:
  nfs-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  nfs-network:
    driver: bridge

